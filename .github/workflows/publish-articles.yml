name: Publish structured articles

on:
  push:
    branches: [main]
    paths:
      - "content/articles.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: article-publication
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-publishing.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -r requirements-publishing.txt
      - name: Generate, approve, build and validate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tools/article_pipeline.py publish
          node tools/check_inline_js.mjs
      - name: Commit generated publication
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articles.json articles assets/images/articles assets/dashboard.js
          git commit -m "Publish structured articles"
          git push
